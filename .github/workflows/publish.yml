name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag or commit SHA) to build'
        required: true
        type: string 
        default: 'main'
  push:
    tags:
      - 'v*'
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build docker image
    needs: [ ci ]

    timeout-minutes: 60

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to the container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=auto
          tags: |
            type=sha,format=long
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: 'linux/amd64,linux/arm64'
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          # https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#adding-a-description-to-multi-arch-images
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=A multi-arch Docker image for the Muquirana Rails app
          build-args: BUILD_COMMIT_SHA=${{ github.sha }}

  # Dispara o deploy no Coolify SO depois de CI verde + imagem publicada. Assim o
  # deploy nunca sai com o CI vermelho (ao contrario do auto-deploy-no-push).
  #
  # Requer dois secrets no repo (Settings > Secrets and variables > Actions):
  #   COOLIFY_WEBHOOK  -> URL de deploy do recurso no Coolify
  #                       (App > ... nao: use a API: https://<coolify>/api/v1/deploy?uuid=<uuid>&force=false)
  #   COOLIFY_TOKEN    -> API token do Coolify (Keys & Tokens > API tokens)
  # Sem os secrets, o job pula sem falhar -- forks/quem nao usa Coolify seguem ok.
  deploy:
    name: Trigger Coolify deploy
    needs: [ build ]
    runs-on: ubuntu-latest
    # Nunca em PR; so em publish real (push na main/tag ou workflow_dispatch).
    if: github.event_name != 'pull_request'
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "::notice::COOLIFY_WEBHOOK/COOLIFY_TOKEN nao configurados -- deploy pulado."
            exit 0
          fi
          echo "CI + build verdes. Disparando deploy no Coolify..."
          curl --fail-with-body --silent --show-error \
            --request GET "$COOLIFY_WEBHOOK" \
            --header "Authorization: Bearer $COOLIFY_TOKEN"
          echo ""
          echo "::notice::Deploy do Coolify disparado."
