title: Sugestão de funcionalidade
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pelo interesse no Muquirana! Preencha o modelo abaixo para propor uma funcionalidade. Antes, dê uma olhada nas [sugestões já abertas](https://github.com/Bulletdev/muquirana/discussions/categories/ideas) para ver se alguém já propôs algo parecido.
  - type: textarea
    attributes:
      label: Descreva a funcionalidade
      description: Explique de forma clara e objetiva o que você gostaria que o app fizesse.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Por que ela é importante?
      description: Conte que problema específico isso resolve para você ou para outras pessoas.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Contexto, capturas de tela e links relevantes
      description: Qualquer informação a mais que ajude a avaliar se a funcionalidade faz sentido para o projeto.
