# ===========================================================================
# Exemplo de Docker Compose — Muquirana
# ===========================================================================
#
# Para rodar o Muquirana na sua maquina ou numa VPS simples.
#
# SE VOCE USA COOLIFY, use docker/docker-compose.production.yml -- ele delega o
# proxy reverso e o TLS ao Coolify/Traefik e nao expoe portas na VPS.
#
# Guia: docs/hosting/docker.md
#
# ---------------------------------------------------------------------------
# ANTES DE EXPOR NA INTERNET
# ---------------------------------------------------------------------------
#   1. Gere um SECRET_KEY_BASE proprio:  openssl rand -hex 64
#      O default abaixo e PUBLICO e serve so para subir local. Em modo
#      self-hosted ele deriva as chaves de criptografia do banco: quem o tiver
#      le os tokens de acesso bancario e as chaves de API.
#   2. Troque POSTGRES_PASSWORD.
#   3. Se houver proxy com TLS na frente, ligue RAILS_FORCE_SSL e
#      RAILS_ASSUME_SSL, e defina APP_DOMAIN.

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-muquirana}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-muquirana_local_only}
  POSTGRES_DB: ${POSTGRES_DB:-muquirana_production}

x-rails-env: &rails_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:-troque_isto_openssl_rand_hex_64}
  SELF_HOSTED: "true"
  # Deixe false para rodar em http://localhost. Ligue os dois quando houver
  # proxy com TLS na frente -- ASSUME_SSL faz o Rails confiar no
  # X-Forwarded-Proto, sem ele o FORCE_SSL entra em loop de redirect.
  RAILS_FORCE_SSL: ${RAILS_FORCE_SSL:-false}
  RAILS_ASSUME_SSL: ${RAILS_ASSUME_SSL:-false}
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  # Host canonico dos links de e-mail (reset de senha, convite).
  APP_DOMAIN: ${APP_DOMAIN:-localhost:3000}
  # AGPLv3 secao 13: o rodape linka o codigo-fonte desta instancia. Se voce
  # modificar o app, aponte para o SEU fork.
  SOURCE_CODE_URL: ${SOURCE_CODE_URL:-https://github.com/Bulletdev/muquirana}
  # Tela "Novidades". Sem isto, nenhuma chamada e feita.
  GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-Bulletdev}
  GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-muquirana}
  # Opcional: habilita o assistente de IA. Gera custo na sua conta OpenAI --
  # configure limite de gasto antes de ativar.
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}

services:
  # A imagem sai de .github/workflows/publish.yml (push na main e tag v*).
  #
  # O compose herdado do projeto original apontava para
  # `ghcr.io/maybe-finance/maybe:latest` -- ou seja, subia a imagem do Maybe, e
  # nao a deste fork.
  web:
    image: ${MUQUIRANA_IMAGE:-ghcr.io/bulletdev/muquirana:latest}
    volumes:
      - app-storage:/rails/storage
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      <<: *rails_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/up || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - muquirana_net

  worker:
    image: ${MUQUIRANA_IMAGE:-ghcr.io/bulletdev/muquirana:latest}
    command: bundle exec sidekiq -C config/sidekiq.yml
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *rails_env
    networks:
      - muquirana_net

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - muquirana_net

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - muquirana_net

volumes:
  app-storage:
  postgres-data:
  redis-data:

networks:
  muquirana_net:
    driver: bridge
