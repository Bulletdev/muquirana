# Muquirana — deploy de producao no Coolify
#
# Mesma estrutura do docker-compose.production.yml da prostaff-api, que ja roda
# nesta VPS: rede `coolify` externa, labels `coolify.managed`, roteamento por
# Host no Traefik com TLS do Let's Encrypt e healthcheck em /up.
#
# DIFERENCA IMPORTANTE EM RELACAO A PROSTAFF: aqui NAO existe middleware de CORS.
# A prostaff-api e API-only e o front vive em outra origem, entao precisa liberar
# CORS. O Muquirana e um monolito Hotwire -- HTML, Turbo Streams, assets e
# WebSocket saem todos da MESMA origem. CORS nao se aplica; adicionar so criaria
# superficie a toa.
#
# Como usar no Coolify:
#   1. New Resource > Docker Compose, aponte para este arquivo.
#   2. Cole as variaveis de docker/.env.production.example no painel.
#   3. Aponte o registro A do dominio para o IP da VPS.
#   4. O Traefik pega o certificado do Let's Encrypt sozinho.
#
# Se um dia entrar Cloudflare na frente: o SSL dela precisa ficar em
# "Full (strict)". Em "Flexible" ela fala HTTP com a origem, o Rails
# redireciona para HTTPS por causa do RAILS_FORCE_SSL e vira loop infinito.
#
# A imagem sai de .github/workflows/publish.yml (ghcr.io/<owner>/<repo>), que
# dispara em push na main e em tag v*.

# Obrigatorias:
#   APP_DOMAIN         host canonico, sem https:// e sem barra final
#   SECRET_KEY_BASE    openssl rand -hex 64
#   POSTGRES_PASSWORD  openssl rand -base64 32
#   REDIS_PASSWORD     openssl rand -hex 32  <- HEX, nao base64: vai dentro do
#                      REDIS_URL e o "/" do base64 quebra a URL
#
# Nao ha ${VAR:?...} aqui: o Coolify roda `docker compose build` antes de subir
# e so passa as vars marcadas como build-time, entao um :? derruba o deploy
# mesmo com a variavel configurada no painel. Cada servico se defende sozinho:
# o postgres recusa POSTGRES_PASSWORD vazia, o Rails nao boota sem
# SECRET_KEY_BASE, e o redis tem um guard explicito no command (o unico caso
# que falharia em silencio -- ver o comentario la).
#
# Detalhes de cada uma em docker/.env.production.example.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - coolify
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-muquirana_production}'
      POSTGRES_USER: '${POSTGRES_USER:-muquirana}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-muquirana} -d ${POSTGRES_DB:-muquirana_production}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - coolify.managed=true
      - coolify.type=application

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Guard em RUNTIME, nao na interpolacao (${VAR:?...}): o Coolify roda
    # `docker compose build` antes de subir e so passa as vars marcadas como
    # build-time -- um :? aqui derruba o deploy mesmo com a variavel
    # configurada no painel.
    #
    # Sem guard nenhum, REDIS_PASSWORD vazia nao quebra -- e pior: o Redis
    # sobe SEM SENHA, o healthcheck passa (o ping responde) e a app conecta
    # normal. Um Redis aberto na rede, em silencio. Por isso o container
    # recusa a subir.
    #
    # Gere com `openssl rand -hex 32` -- HEX, nao base64: a senha entra no
    # REDIS_URL (redis://default:SENHA@redis:6379/0) e o "/" do base64 corta
    # a URL, o parser le o resto como porta e estoura.
    command: >
      sh -c 'test -n "$$REDIS_PASSWORD" ||
             { echo "ERRO: REDIS_PASSWORD vazia. Gere com: openssl rand -hex 32"; exit 1; };
             exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes'
    networks:
      - coolify
    volumes:
      - redis-data:/data
    environment:
      # Aqui so para o healthcheck abaixo poder autenticar.
      REDIS_PASSWORD: '${REDIS_PASSWORD}'
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - coolify.managed=true
      - coolify.type=application

  web:
    image: '${MUQUIRANA_IMAGE:-ghcr.io/bulletdev/muquirana:latest}'
    restart: unless-stopped
    stop_grace_period: 35s
    networks:
      - coolify
    expose:
      - "3000"
    volumes:
      # ActiveStorage em disco: anexos (foto de perfil, ZIP de exportacao).
      # Sem volume, some a cada redeploy.
      - app-storage:/rails/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - coolify.managed=true
      - coolify.type=application

      # ATENCAO: dominio LITERAL aqui, sem ${APP_DOMAIN}.
      #
      # O Coolify reescreve este compose e escapa os $ dos labels: um
      # ${APP_DOMAIN} vira $${APP_DOMAIN} no arquivo dele, o Docker traduz de
      # volta para o texto cru e o Traefik recebe a string "${APP_DOMAIN}" --
      # nao o dominio. O Let's Encrypt entao recusa:
      #
      #   Cannot issue for "${app_domain}": Domain name contains an invalid
      #   character
      #
      # E o app responde 503 porque nenhuma regra de Host casa.
      #
      # O mesmo vale para o $1 de um redirectregex: o escape do Coolify o
      # inutiliza. Por isso o www e servido pelo proprio router em vez de
      # redirecionado -- sem $, nao ha o que escapar.
      #
      # APP_DOMAIN continua existindo como env (o Rails usa nos links de
      # e-mail); o que nao funciona e interpolar em LABEL.
      - traefik.enable=true
      - traefik.http.routers.muquirana.rule=Host(`muquirana.com`) || Host(`www.muquirana.com`)
      - traefik.http.routers.muquirana.entrypoints=https
      - traefik.http.routers.muquirana.tls=true
      - traefik.http.routers.muquirana.tls.certresolver=letsencrypt
      - traefik.http.services.muquirana.loadbalancer.server.port=3000
      - traefik.http.services.muquirana.loadbalancer.server.scheme=http

      # Redirect HTTP -> HTTPS
      - traefik.http.routers.muquirana-http.rule=Host(`muquirana.com`) || Host(`www.muquirana.com`)
      - traefik.http.routers.muquirana-http.entrypoints=http
      - traefik.http.routers.muquirana-http.middlewares=muquirana-redirect-https
      - traefik.http.middlewares.muquirana-redirect-https.redirectscheme.scheme=https

      - traefik.docker.network=coolify

      # Healthcheck do Traefik sobre o /up do Rails (defesa em profundidade
      # sobre o healthcheck do Docker abaixo)
      - traefik.http.services.muquirana.loadbalancer.healthcheck.path=/up
      - traefik.http.services.muquirana.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.muquirana.loadbalancer.healthcheck.timeout=5s

    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      WEB_CONCURRENCY: '${WEB_CONCURRENCY:-2}'
      RAILS_MAX_THREADS: '${RAILS_MAX_THREADS:-5}'
      PORT: 3000

      # Desliga o paywall/Stripe (subscriptions_controller.rb:3)
      SELF_HOSTED: 'true'

      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: '${POSTGRES_DB:-muquirana_production}'
      POSTGRES_USER: '${POSTGRES_USER:-muquirana}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      REDIS_URL: 'redis://default:${REDIS_PASSWORD}@redis:6379/0'

      SECRET_KEY_BASE: '${SECRET_KEY_BASE}'

      # Atras do Traefik o Rails so sabe que a conexao e HTTPS pelo
      # X-Forwarded-Proto -- e o que assume_ssl le. Sem ele, force_ssl
      # redireciona em loop.
      RAILS_FORCE_SSL: '${RAILS_FORCE_SSL:-true}'
      RAILS_ASSUME_SSL: '${RAILS_ASSUME_SSL:-true}'

      # Host canonico dos links de e-mail (reset de senha, convite).
      # Sem isto os links saem quebrados.
      APP_DOMAIN: '${APP_DOMAIN}'

      # AGPLv3 secao 13: o rodape linka o codigo-fonte desta instancia.
      SOURCE_CODE_URL: '${SOURCE_CODE_URL:-https://github.com/Bulletdev/muquirana}'

      # Tela "Novidades" e os links de versao/commit no menu. Sem isto, nao ha
      # chamada e o app nao exibe release notes de projeto nenhum.
      GITHUB_REPO_OWNER: '${GITHUB_REPO_OWNER:-Bulletdev}'
      GITHUB_REPO_NAME: '${GITHUB_REPO_NAME:-muquirana}'

      OPENAI_ACCESS_TOKEN: '${OPENAI_ACCESS_TOKEN}'

      SMTP_ADDRESS: '${SMTP_ADDRESS}'
      SMTP_PORT: '${SMTP_PORT:-587}'
      SMTP_USERNAME: '${SMTP_USERNAME}'
      SMTP_PASSWORD: '${SMTP_PASSWORD}'
      SMTP_TLS_ENABLED: '${SMTP_TLS_ENABLED:-true}'
      EMAIL_SENDER: '${EMAIL_SENDER}'

    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/up || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  worker:
    image: '${MUQUIRANA_IMAGE:-ghcr.io/bulletdev/muquirana:latest}'
    command: 'bundle exec sidekiq -C config/sidekiq.yml'
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - coolify.managed=true
      - coolify.type=application
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      SELF_HOSTED: 'true'

      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: '${POSTGRES_DB:-muquirana_production}'
      POSTGRES_USER: '${POSTGRES_USER:-muquirana}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      REDIS_URL: 'redis://default:${REDIS_PASSWORD}@redis:6379/0'

      SECRET_KEY_BASE: '${SECRET_KEY_BASE}'

      # O worker manda e-mail (convite, reset de senha) fora do ciclo da
      # request, entao precisa do APP_DOMAIN tanto quanto o web.
      APP_DOMAIN: '${APP_DOMAIN}'

      OPENAI_ACCESS_TOKEN: '${OPENAI_ACCESS_TOKEN}'

      SMTP_ADDRESS: '${SMTP_ADDRESS}'
      SMTP_PORT: '${SMTP_PORT:-587}'
      SMTP_USERNAME: '${SMTP_USERNAME}'
      SMTP_PASSWORD: '${SMTP_PASSWORD}'
      SMTP_TLS_ENABLED: '${SMTP_TLS_ENABLED:-true}'
      EMAIL_SENDER: '${EMAIL_SENDER}'

    # Sem healthcheck, de proposito.
    #
    # O `bundle exec` faz exec, entao o Sidekiq E o PID 1 deste container: se
    # ele morrer, o container morre e o Docker ja mostra Exited. Um healthcheck
    # de "o processo existe?" seria tautologico -- nunca poderia falhar com o
    # container de pe -- e um check que nunca falha e pior que nenhum: aparenta
    # uma verificacao que nao acontece.
    #
    # O anterior era `pgrep -f sidekiq`, e o pgrep NAO existe nesta imagem
    # (verificado): o worker ficava permanentemente unhealthy no painel com o
    # Sidekiq rodando normal. Falso negativo permanente treina a ignorar o
    # painel.
    #
    # Um check util aqui seria ler o heartbeat que o Sidekiq grava no Redis --
    # detectaria o processo vivo mas travado. Precisa de redis-cli na imagem
    # (nao tem) ou de subir o Rails a cada 30s (caro). Fica como divida.

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local

networks:
  coolify:
    external: true
