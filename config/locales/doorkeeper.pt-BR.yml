    errors:
      messages:
        access_denied: O dono do recurso ou o servidor de autorização negou a requisição.
        admin_authenticator_not_configured: O acesso ao painel de admin está bloqueado
          porque Doorkeeper.configure.admin_authenticator não está configurado.
        credential_flow_not_configured: O fluxo Resource Owner Password Credentials
          falhou porque Doorkeeper.configure.resource_owner_from_credentials não está
          configurado.
        forbidden_token:
          missing_scope: O acesso a este recurso exige a permissão "%{oauth_scopes}".
        invalid_client: A autenticação do cliente falhou por cliente desconhecido,
          autenticação de cliente ausente ou método de autenticação sem suporte.
        invalid_code_challenge_method:
          one: O code_challenge_method precisa ser %{challenge_methods}.
          other: 'O code_challenge_method precisa ser um destes: %{challenge_methods}.'
          zero: O servidor de autorização não suporta PKCE porque não há valores de
            code_challenge_method aceitos.
        invalid_grant: A concessão de autorização informada é inválida, expirou, foi
          revogada, não corresponde à redirect URI usada na requisição de autorização
          ou foi emitida para outro cliente.
        invalid_redirect_uri: A redirect uri informada está malformada ou não corresponde
          à redirect URI do cliente.
        invalid_request:
          invalid_code_challenge: O code challenge é obrigatório.
          missing_param: 'Parâmetro obrigatório ausente: %{value}.'
          request_not_authorized: A requisição precisa ser autorizada. O parâmetro
            obrigatório para autorizar a requisição está ausente ou é inválido.
          unknown: A requisição não tem um parâmetro obrigatório, inclui um valor
            de parâmetro sem suporte ou está malformada.
        invalid_scope: A permissão solicitada é inválida, desconhecida ou está malformada.
        invalid_token:
          expired: O access token expirou
          revoked: O access token foi revogado
          unknown: O access token é inválido
        resource_owner_authenticator_not_configured: A busca pelo Resource Owner falhou
          porque Doorkeeper.configure.resource_owner_authenticator não está configurado.
        revoke:
          unauthorized: Você não tem autorização para revogar este token
        server_error: O servidor de autorização encontrou uma condição inesperada
          que o impediu de atender à requisição.
        temporarily_unavailable: No momento o servidor de autorização não consegue
          atender à requisição por causa de sobrecarga temporária ou manutenção do
          servidor.
        unauthorized_client: O cliente não tem autorização para fazer esta requisição
          usando este método.
        unsupported_grant_type: O servidor de autorização não suporta este tipo de
          concessão de autorização.
        unsupported_response_mode: O servidor de autorização não suporta este response
          mode.
        unsupported_response_type: O servidor de autorização não suporta este response
          type.
