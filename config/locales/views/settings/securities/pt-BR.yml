            criptografados (chaves de API, tokens de bancos e provedores, segredos
            de verificação em duas etapas e dados pessoais) ficarão ilegíveis de
            forma permanente. Fixe as chaves definindo-as nas credentials do Rails
            ou nas variáveis de ambiente:"
          keys:
            - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
            - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
            - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
          title: As chaves de criptografia do Active Record não estão definidas
            explicitamente
        mfa_description: Adicione uma camada extra de proteção exigindo um código
