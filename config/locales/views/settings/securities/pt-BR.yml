pt-BR:
  settings:
    securities:
      show:
        disable_mfa: Desativar verificação em duas etapas
        disable_mfa_confirm: Tem certeza que quer desativar a verificação em duas
          etapas? Sua conta vai ficar menos protegida.
        enable_mfa: Ativar verificação em duas etapas
        encryption_warning:
          generate: "Gere um conjunto com: bin/rails db:encryption:init"
          intro: "Seus dados continuam criptografados, mas as chaves de criptografia
            estão sendo derivadas do SECRET_KEY_BASE. Se você girar o SECRET_KEY_BASE
