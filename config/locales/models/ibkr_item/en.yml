---
en:
  activerecord:
    attributes:
      ibkr_item:
        query_id: Query ID
        token: Token
        name: Name
    models:
      ibkr_item: Interactive Brokers connection
      ibkr_account: Interactive Brokers account
  ibkr_item:
    syncer:
      errors:
        credentials_missing: Interactive Brokers credentials are missing. Edit the
          connection and paste the Query ID and Token from your Flex Query.
        authentication: Interactive Brokers rejected the Query ID or Token. In the
          Client Portal, under Reports > Settings > Flex Web Service, generate a new
          Token and check the Query ID under Flex Queries, then paste both again.
        invalid_query: The Flex Query is invalid or misconfigured. In the Client Portal,
          review the Flex Query definition (include Open Positions and Trades) and
          try again.
        statement_not_ready: The statement was still being generated by Interactive
          Brokers. This is temporary - wait a few moments and sync again.
        rate_limited: Interactive Brokers temporarily rate-limited requests. Wait a
          few minutes and sync again.
