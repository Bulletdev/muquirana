---
pt-BR:
  accountables:
    # display_name_singular NAO e derivavel de display_name: o `singularize` do
    # ActiveSupport usa regras do ingles ("Imoveis" -> "Imovei"). Por isso as
    # duas formas sao chaves separadas.
    #
    # subtypes.*: rotulo exibido de accounts.subtype. As CHAVES ("checking",
    # "401k") sao valores persistidos no banco -- nao sao traduziveis, so os
    # rotulos. Este e o unico lugar onde os subtipos sao traduzidos: as views
    # (dropdown do formulario) e a sidebar (badge da conta) passam ambas por
    # Accountable#subtype_label_for, entao nao ha como divergirem.
    #
    # Produtos que so existem nos EUA (401k, Roth 401k, Roth IRA, IRA, 529, HSA)
    # ficam com o nome proprio, as vezes com uma glosa entre parenteses. Nao ha
    # equivalente brasileiro, e inventar um afirmaria uma equivalencia falsa.
    # A taxonomia inteira ser americana e uma questao de produto em aberto.
    credit_card:
      display_name: Cartões de crédito
      display_name_singular: Cartão de crédito
      subtypes:
        credit_card:
          long: Cartão de crédito
          short: Cartão de crédito
    crypto:
      display_name: Cripto
      display_name_singular: Cripto
    depository:
      display_name: Dinheiro
      display_name_singular: Dinheiro
      subtypes:
        cd:
          long: CDB (Certificado de Depósito Bancário)
          short: CDB
        checking:
          long: Conta corrente
          short: Conta corrente
        hsa:
          long: Conta de poupança para saúde (HSA)
          short: HSA
        money_market:
          long: Fundo de renda fixa
          short: Renda fixa
        savings:
          long: Poupança
          short: Poupança
    investment:
      display_name: Investimentos
      display_name_singular: Investimento
      subtypes:
        '401k':
          long: 401(k)
          short: 401(k)
        '529_plan':
          long: Plano 529
          short: Plano 529
        angel:
          long: Investimento anjo
          short: Anjo
        brokerage:
          long: Conta em corretora
          short: Corretora
        hsa:
          long: Conta de poupança para saúde (HSA)
          short: HSA
        ira:
          long: IRA tradicional
          short: IRA
        mutual_fund:
          long: Fundo de investimento
          short: Fundo
        pension:
